<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Portal Pembagian Kelas VII | SMP Negeri 1 Slogohimo</title>

    <meta name="description"
        content="Portal Pembagian Kelas VII SMP Negeri 1 Slogohimo Tahun Ajaran 2026/2027">

    <link rel="icon" href="logo.png">

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- =========================
         HEADER
    ========================== -->

    <header class="header">

        <div class="logo-area">

            <img src="logo.png"
                alt="Logo SMP Negeri 1 Slogohimo">

        </div>

        <div class="title-area">

            <h1>SMP NEGERI 1 SLOGOHIMO</h1>

            <h2>PORTAL PEMBAGIAN KELAS VII</h2>

            <p>Tahun Ajaran 2026 / 2027</p>

        </div>

    </header>

    <!-- =========================
         TOOLBAR
    ========================== -->

    <section class="toolbar">

        <div class="search-area">

            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Cari Nama Peserta Didik...">

        </div>

        <div class="toolbar-info">

            <span id="currentClass">

                Memuat...

            </span>

            <span id="jumlahSiswa">

                Jumlah Siswa : 0

            </span>

        </div>

    </section>

    <!-- =========================
         TAB KELAS
    ========================== -->

    <nav
        id="tabs"
        class="tabs">

    </nav>

    <!-- =========================
         LOADING
    ========================== -->

    <section
        id="loading"
        class="loading">

        <div class="spinner"></div>

        <p>Membaca data.xlsx ...</p>

    </section>

    <!-- =========================
         TABLE
    ========================== -->

    <main class="container">

        <div class="table-card">

            <table id="studentTable">

                <thead>

                    <tr>

                        <th>No</th>

                        <th>Absen</th>

                        <th>No. Induk</th>

                        <th>Nama Peserta Didik</th>

                        <th>JK</th>

                    </tr>

                </thead>

                <tbody id="tableBody">

                </tbody>

            </table>

        </div>

    </main>

    <!-- =========================
         FOOTER
    ========================== -->

    <footer>

        © 2026 SMP Negeri 1 Slogohimo

    </footer>

    <!-- =========================
         LIBRARY
    ========================== -->

    <script src="xlsx.full.min.js"></script>

    <!-- =========================
         JAVASCRIPT
    ========================== -->

    <script src="script.js"></script>

</body>

</html>
