<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Portal Pembagian Kelas VII | SMP Negeri 1 Slogohimo</title>

    <meta name="description"
        content="Portal Pembagian Kelas VII SMP Negeri 1 Slogohimo Tahun Ajaran 2026/2027">

    <link rel="icon" href="logo.png">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="logo">

            <img src="logo.png" alt="Logo SMP Negeri 1 Slogohimo">

        </div>

        <div class="header-text">

            <h1>SMP NEGERI 1 SLOGOHIMO</h1>

            <h2>PORTAL PEMBAGIAN KELAS VII</h2>

            <p>Tahun Ajaran 2026 / 2027</p>

        </div>

    </header>

    <!-- ================= TOOLBAR ================= -->

    <section class="toolbar">

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Cari Nama Peserta Didik...">

        </div>

        <div class="toolbar-info">

            <span id="currentClass">
                Kelas :
            </span>

            <span id="studentCount">
                Jumlah Siswa : 0
            </span>

        </div>

    </section>

    <!-- ================= TAB ================= -->

    <nav id="classTabs" class="class-tabs">

        <nav class="class-tabs">

    <button class="tab active" data-sheet="7A">7A</button>

    <button class="tab" data-sheet="7B">7B</button>

    <button class="tab" data-sheet="7C">7C</button>

    <button class="tab" data-sheet="7D">7D</button>

    <button class="tab" data-sheet="7E">7E</button>

    <button class="tab" data-sheet="7F">7F</button>

    <button class="tab" data-sheet="7G">7G</button>

</nav>

    </nav>

    <!-- ================= LOADING ================= -->

    <div id="loading" class="loading">

        <div class="spinner"></div>

        <p>Membaca data.xlsx ...</p>

    </div>

    <!-- ================= TABLE ================= -->

    <main class="container">

        <div class="table-wrapper">

            <table id="studentTable">

                <thead>

                    <tr>

                        <th>No</th>

                        <th>Absen</th>

                        <th>No. Induk</th>

                        <th>Nama Peserta Didik</th>

                        <th>JK</th>

                    </tr>

                </thead>

                <tbody id="tableBody">

                </tbody>

            </table>

        </div>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer>

        <p>© 2026 SMP Negeri 1 Slogohimo</p>

    </footer>

    <!-- ================= LIBRARY ================= -->

    <script src="xlsx.full.min.js"></script>

    <!-- ================= SCRIPT ================= -->

    <script src="script.js"></script>

</body>

</html>
